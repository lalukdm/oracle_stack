version: "3.9"

services:
  cloudbeaver:
    image: dbeaver/cloudbeaver:24.0.4
    container_name: cloudbeaver
    restart: unless-stopped

    # ВАЖНО: пробрасываем 8978 НА 8978
    ports:
      - "8978:8978"

    environment:
      - CB_SERVER_JAVA_OPTS=-Xms128m -Xmx256m

    volumes:
      - ./cloudbeaver/workspace:/opt/cloudbeaver/workspace

  oracle:
    image: wnameless/oracle-xe-11g-r2
    container_name: oracle-db
    restart: unless-stopped

    environment:
      - ORACLE_ALLOW_REMOTE=true

    ports:
      - "1521:1521"

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped

    environment:
      - ORACLE_DSN=oracle-db:1521/XE
      - ORACLE_USER=system
      - ORACLE_PASSWORD=oracle

    depends_on:
      - oracle

    expose:
      - "5000"

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
