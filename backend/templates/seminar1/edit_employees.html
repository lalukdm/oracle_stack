{% extends "base.html" %}

{% block title %}Редактирование сотрудника{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/sem1_task3.css') }}">

<div class="add-form-container">
    <h1>Редактирование сотрудника</h1>

    {% if error %}
    <div class="error-message" style="background-color: #f8d7da; padding: 15px; margin: 20px 0; border-radius: 4px;">
        <p style="color: #721c24;">{{ error }}</p>
    </div>
    {% endif %}

    {% if record %}
    <form method="post" class="add-form">
        <div class="form-row" style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>Имя *</label>
                <input type="text" name="first_name" required class="form-control" 
                       value="{{ record[1] or '' }}">
            </div>

            <div class="form-group" style="flex: 1;">
                <label>Фамилия *</label>
                <input type="text" name="last_name" required class="form-control" 
                       value="{{ record[2] or '' }}">
            </div>
        </div>

        <div class="form-group">
            <label>Должность *</label>
            <input type="text" name="position" required class="form-control" 
                   value="{{ record[3] or '' }}">
        </div>

        <div class="form-group">
            <label>Отдел *</label>
            <select name="department" required class="form-control">
                <option value="TESTING" {% if record[4] == 'TESTING' %}selected{% endif %}>Тестирование</option>
                <option value="ANALYSIS" {% if record[4] == 'ANALYSIS' %}selected{% endif %}>Аналитика</option>
                <option value="MANAGEMENT" {% if record[4] == 'MANAGEMENT' %}selected{% endif %}>Управление</option>
            </select>
        </div>

        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" required class="form-control" 
                   value="{{ record[5] or '' }}">
        </div>

        <div class="form-group">
            <label>Телефон</label>
            <input type="text" name="phone" class="form-control" 
                   value="{{ record[6] or '' }}">
        </div>

        <div class="form-group">
            <label>Статус</label>
            <select name="status" class="form-control">
                <option value="ACTIVE" {% if record[7] == 'ACTIVE' %}selected{% endif %}>Активен</option>
                <option value="INACTIVE" {% if record[7] == 'INACTIVE' %}selected{% endif %}>Неактивен</option>
            </select>
        </div>

        <div class="form-group">
            <label>Руководитель</label>
            <select name="manager_id" class="form-control">
                <option value="">Нет руководителя</option>
                {% for emp in employees %}
                <option value="{{ emp[0] }}" {% if record[8] == emp[0] %}selected{% endif %}>
                    {{ emp[1] }} {{ emp[2] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="asu-btn-success">Сохранить</button>
            <a href="{{ url_for('seminar1_task3_advanced') }}" class="asu-btn-secondary">Отмена</a>
        </div>
    </form>
    {% else %}
    <p>Сотрудник не найден</p>
    <a href="{{ url_for('seminar1_task3_advanced') }}" class="asu-btn-secondary">Вернуться</a>
    {% endif %}
</div>
{% endblock %}
