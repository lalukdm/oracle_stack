{% extends "base.html" %}

{% block title %}Редактирование проекта{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/sem1_task3.css') }}">

<div class="add-form-container">
    <h1>Редактирование проекта</h1>

    {% if error %}
    <div class="error-message" style="background-color: #f8d7da; padding: 15px; margin: 20px 0; border-radius: 4px;">
        <p style="color: #721c24;">{{ error }}</p>
    </div>
    {% endif %}

    {% if record %}
    <form method="post" class="add-form">
        <div class="form-group">
            <label>Название проекта *</label>
            <input type="text" name="project_name" required class="form-control" 
                   value="{{ record[1] or '' }}">
        </div>

        <div class="form-group">
            <label>Клиент</label>
            <select name="client_id" class="form-control">
                <option value="">Нет клиента</option>
                {% for client in clients %}
                <option value="{{ client[0] }}" {% if record[2] == client[0] %}selected{% endif %}>
                    {{ client[1] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Описание</label>
            <textarea name="description" class="form-control" rows="4">{{ record[3] or '' }}</textarea>
        </div>

        <div class="form-group">
            <label>Статус</label>
            <select name="status" class="form-control">
                <option value="ACTIVE" {% if record[4] == 'ACTIVE' %}selected{% endif %}>Активен</option>
                <option value="ON_HOLD" {% if record[4] == 'ON_HOLD' %}selected{% endif %}>Приостановлен</option>
                <option value="COMPLETED" {% if record[4] == 'COMPLETED' %}selected{% endif %}>Завершен</option>
                <option value="CANCELLED" {% if record[4] == 'CANCELLED' %}selected{% endif %}>Отменен</option>
            </select>
        </div>

        <div class="form-group">
            <label>Приоритет (1-5)</label>
            <select name="priority" class="form-control">
                <option value="1" {% if record[5] == 1 %}selected{% endif %}>1 - Высокий</option>
                <option value="2" {% if record[5] == 2 %}selected{% endif %}>2</option>
                <option value="3" {% if record[5] == 3 %}selected{% endif %}>3 - Средний</option>
                <option value="4" {% if record[5] == 4 %}selected{% endif %}>4</option>
                <option value="5" {% if record[5] == 5 %}selected{% endif %}>5 - Низкий</option>
            </select>
        </div>

        <div class="form-group">
            <label>Руководитель проекта</label>
            <select name="manager_id" class="form-control">
                <option value="">Не назначен</option>
                {% for emp in employees %}
                <option value="{{ emp[0] }}" {% if record[6] == emp[0] %}selected{% endif %}>
                    {{ emp[1] }} {{ emp[2] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="asu-btn-success">Сохранить</button>
            <a href="{{ url_for('seminar1_task3_advanced') }}" class="asu-btn-secondary">Отмена</a>
        </div>
    </form>
    {% else %}
    <p>Проект не найден</p>
    <a href="{{ url_for('seminar1_task3_advanced') }}" class="asu-btn-secondary">Вернуться</a>
    {% endif %}
</div>
{% endblock %}
