{% extends "base.html" %}

{% block title %}Добавление проекта{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/sem1_task3.css') }}">

<div class="add-form-container">
    <h1>Добавление нового проекта</h1>

    {% if error %}
    <div class="error-message" style="background-color: #f8d7da; padding: 15px; margin: 20px 0; border-radius: 4px;">
        <p style="color: #721c24;">{{ error }}</p>
    </div>
    {% endif %}

    <form method="post" class="add-form">
        <div class="form-group">
            <label>Название проекта *</label>
            <input type="text" name="project_name" required class="form-control" 
                   value="{{ request.form.project_name or '' }}">
        </div>

        <div class="form-group">
            <label>Клиент</label>
            <select name="client_id" class="form-control">
                <option value="">Нет клиента</option>
                {% for client in clients %}
                <option value="{{ client[0] }}" {% if request.form.client_id == client[0]|string %}selected{% endif %}>
                    {{ client[1] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Описание</label>
            <textarea name="description" class="form-control" rows="4">{{ request.form.description or '' }}</textarea>
        </div>

        <div class="form-group">
            <label>Дата начала *</label>
            <input type="date" name="start_date" required class="form-control" 
                   value="{{ request.form.start_date or '' }}">
        </div>

        <div class="form-group">
            <label>Приоритет (1-5)</label>
            <select name="priority" class="form-control">
                <option value="1" {% if request.form.priority == '1' %}selected{% endif %}>1 - Высокий</option>
                <option value="2" {% if request.form.priority == '2' %}selected{% endif %}>2</option>
                <option value="3" {% if not request.form.priority or request.form.priority == '3' %}selected{% endif %}>3 - Средний</option>
                <option value="4" {% if request.form.priority == '4' %}selected{% endif %}>4</option>
                <option value="5" {% if request.form.priority == '5' %}selected{% endif %}>5 - Низкий</option>
            </select>
        </div>

        <div class="form-group">
            <label>Руководитель проекта</label>
            <select name="manager_id" class="form-control">
                <option value="">Не назначен</option>
                {% for emp in employees %}
                <option value="{{ emp[0] }}" {% if request.form.manager_id == emp[0]|string %}selected{% endif %}>
                    {{ emp[1] }} {{ emp[2] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="asu-btn-success">Сохранить</button>
            <a href="{{ url_for('seminar1_task3_advanced') }}" class="asu-btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
